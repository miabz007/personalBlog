
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Contact</title>

    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/font-awesome.min.css">
    <link rel="stylesheet" href="css/templatemo-style.css">

    <style>
        body {
            background: #f5f5f5;
        }

        .overlay-rect {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            padding: 20px;
            margin-top: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* TITLE */
        .page-title {
            text-align: center;
            font-weight: 800;
            margin-bottom: 30px;
        }

        .page-title strong {
            color: #d9534f;
        }

        /* FORM STYLE */
        .form-control {
            border-radius: 8px;
            margin-bottom: 15px;
            height: 45px;
            box-shadow: none;
            border: 1px solid #ddd;
        }

        textarea.form-control {
            height: auto;
        }

        .form-control:focus {
            border-color: #ff5900;
            box-shadow: 0 0 6px rgba(217,83,79,0.2);
        }

        input[type="submit"] {
            background: #ff5900;
            color: #fff;
            font-weight: 700;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            transition: 0.3s;
        }

        input[type="submit"]:hover {
            background: #ff5900;
        }

        /* SOCIAL CARDS */
        .social-card {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            margin-top: 30px;
            transition: 0.3s;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            display: flex;
            align-items: center;
        }

        .social-card:hover {
            transform: translateY(-6px);
        }

        .social-icon {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: #fff;
            margin-right: 15px;
        }

        .facebook { background: #3b5998; }
        .instagram { background: #e1306c; }
        .pinterest { background: #bd081c; }

        .social-text h4 {
            margin: 0;
            font-weight: 700;
        }

        .social-text p {
            margin: 0;
            color: #777;
            font-size: 13px;
        }

        a {
            text-decoration: none !important;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar navbar-default bs-dos-nav navbar-fixed-top sticky-navigation">
    <div class="container">

        <div class="navbar-header">
            <a href="index.html" class="navbar-brand">Contact Me</a>
        </div>

        <nav class="collapse navbar-collapse" id="rock-navigation">
            <ul class="nav navbar-nav navbar-right text-uppercase">
                <li><a href="index.html">Home</a></li>
                <li><a href="work.html">Work</a></li>
                <li><a href="portfolio.html">Portfolio</a></li>
                <li><a href="resume.html">Resume</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>

    </div>
</div>

<!-- MAIN -->
<section class="templatemo-home">

    <div class="container">
        <div class="overlay-rect">

            <!-- TITLE -->
            <h2 class="page-title">
                Contact <strong>Me</strong>
            </h2>

            <p style="text-align:center; color:#777; margin-bottom:10px;">
                Feel free to reach out for collaboration, projects or opportunities
            </p>

            <!-- FORM -->
            <div class="row">

                <div class="col-md-8 col-md-offset-2">

                    <form action="#" method="post">

                        <input class="form-control" type="text" placeholder="Your Name">

                        <input class="form-control" type="email" placeholder="Your Email">

                        <input class="form-control" type="text" placeholder="Subject">

                        <textarea class="form-control" rows="6" placeholder="Your Message"></textarea>

                        <input type="submit" value="Send Message">

                    </form>

                </div>

            </div>

            <!-- SOCIAL -->
            <div class="row">

                <div class="col-md-4">
                    <a href="https://facebook.com" target="_blank">
                        <div class="social-card">

                            <div class="social-icon facebook">
                                <i class="fa fa-facebook"></i>
                            </div>

                            <div class="social-text">
                                <h4>Facebook</h4>
                                <p>Connect with me</p>
                            </div>

                        </div>
                    </a>
                </div>

                <div class="col-md-4">
                    <a href="https://instagram.com" target="_blank">
                        <div class="social-card">

                            <div class="social-icon instagram">
                                <i class="fa fa-instagram"></i>
                            </div>

                            <div class="social-text">
                                <h4>Instagram</h4>
                                <p>DM for updates</p>
                            </div>

                        </div>
                    </a>
                </div>

                <div class="col-md-4">
                    <a href="https://pinterest.com" target="_blank">
                        <div class="social-card">

                            <div class="social-icon pinterest">
                                <i class="fa fa-pinterest"></i>
                            </div>

                            <div class="social-text">
                                <h4>Pinterest</h4>
                                <p>Design inspiration</p>
                            </div>

                        </div>
                    </a>
                </div>

            </div>

        </div>
    </div>

</section>
